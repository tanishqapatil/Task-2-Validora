<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Created</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #fafafa;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
        }
        
        .success-icon {
            width: 48px;
            height: 48px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        
        .success-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }
        
        h1 {
            color: #111;
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 6px 0;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin: 0 0 24px 0;
        }
        
        .user-details {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            font-weight: 500;
            color: #666;
            font-size: 13px;
        }
        
        .detail-value {
            color: #111;
            font-size: 14px;
        }
        
        .users-section {
            margin-bottom: 24px;
        }
        
        .users-section h3 {
            color: #111;
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 12px 0;
        }
        
        #userList {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        #userList li {
            background: #fff;
            border: 1px solid #eee;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 13px;
            color: #333;
        }
        
        .back-btn {
            display: inline-block;
            padding: 10px 16px;
            background: #111;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            transition: background-color 0.15s ease;
        }
        
        .back-btn:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        
        <h1>Account created</h1>
        <p class="subtitle">Your account has been successfully registered</p>
        
        <div class="user-details">
            <div class="detail-row">
                <span class="detail-label">Name</span>
                <span class="detail-value" id="name"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Email</span>
                <span class="detail-value" id="email"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Age</span>
                <span class="detail-value" id="age"></span>
            </div>
        </div>
        
        <div class="users-section">
            <h3>Registered users</h3>
            <ul id="userList"></ul>
        </div>
        
        <a href="/" class="back-btn">Register another</a>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        
        document.getElementById('name').textContent = params.get('name') || '-';
        document.getElementById('email').textContent = params.get('email') || '-';
        document.getElementById('age').textContent = params.get('age') || '-';
        
        var usersData = params.get('users');
        var list = document.getElementById('userList');
        
        if (usersData) {
            var users = JSON.parse(decodeURIComponent(usersData));
            for (var i = 0; i < users.length; i++) {
                var li = document.createElement('li');
                li.textContent = users[i].name + ' — ' + users[i].email;
                list.appendChild(li);
            }
        } else {
            var li = document.createElement('li');
            li.textContent = 'No other users registered';
            li.style.color = '#999';
            list.appendChild(li);
        }
    </script>
</body>
</html>
